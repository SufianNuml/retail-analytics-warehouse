version: 2

models:
  - name: stg_customers
    description: "Cleaned and deduplicated customer records from RAW layer"
    columns:
      - name: customer_id
        description: "Unique identifier for each customer"
        tests:
          - unique
          - not_null
      - name: email
        description: "Customer email address, lowercased and trimmed"
        tests:
          - not_null

  - name: stg_products
    description: "Cleaned product catalog with standardized category casing"
    columns:
      - name: product_id
        description: "Unique identifier for each product"
        tests:
          - unique
          - not_null
      - name: price
        description: "Product price, must be positive"
        tests:
          - not_null

  - name: stg_stores
    description: "Store dimension with location data"
    columns:
      - name: store_id
        description: "Unique identifier for each store"
        tests:
          - unique
          - not_null

  - name: stg_orders
    description: "Transactional order records with valid dates and FK references"
    columns:
      - name: order_id
        description: "Unique identifier for each order"
        tests:
          - unique
          - not_null
      - name: customer_id
        description: "Foreign key to stg_customers"
        tests:
          - not_null
          - relationships:
              to: ref('stg_customers')
              field: customer_id
      - name: product_id
        description: "Foreign key to stg_products"
        tests:
          - not_null
          - relationships:
              to: ref('stg_products')
              field: product_id

  - name: stg_payments
    description: "Payment records, one per order, deduplicated"
    columns:
      - name: payment_id
        description: "Unique identifier for each payment"
        tests:
          - unique
          - not_null
      - name: order_id
        description: "Foreign key to stg_orders"
        tests:
          - not_null

  - name: stg_returns
    description: "Return and refund records linked to orders"
    columns:
      - name: return_id
        description: "Unique identifier for each return"
        tests:
          - unique
          - not_null
      - name: order_id
        description: "Foreign key to stg_orders"
        tests:
          - not_null